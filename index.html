<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Room Sensor Data</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <header>
    <h1>Smart Room Energy Saver Dashboard</h1>
    <p>Live sensor data from your room</p>
  </header>

  <main>
    <table id="data-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Temperature (°C)</th>
          <th>Light Level</th>
          <th>Occupied</th>
          <th>Heater Status</th>
          <th>Light Status</th>
        </tr>
      </thead>
      <tbody>
        <!-- JavaScript will populate rows here -->
      </tbody>
    </table>
  </main>

  <footer>
    <p>Smart Room Energy Saver Project &copy; 2026</p>
  </footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="scripts/script.js"></script>
</body>
</html>
